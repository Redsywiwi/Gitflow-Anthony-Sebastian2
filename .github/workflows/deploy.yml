name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 4m
          script: |

            cd /home/ec2-user/Gitflow-Anthony-Sebastian2

            git fetch origin
            git reset --hard origin/main

            chmod +x mvnw

            #  COMPILA SIN PRUEBAS
            ./mvnw clean package -DskipTests=true -Dmaven.test.skip=true

            sudo docker network create juegos-network || true

            sudo docker rm -f mysql-db springboot-app || true

            sudo docker run -d \
              --name mysql-db \
              --network juegos-network \
              -e MYSQL_ROOT_PASSWORD=root \
              -e MYSQL_DATABASE=BibliotecaJuegos \
              mysql:8 --default-authentication-plugin=mysql_native_password

            echo "Esperando MySQL..."
            sleep 35

            sudo docker build -t juegos-app .

            sudo docker run -d \
              --name springboot-app \
              --network juegos-network \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/BibliotecaJuegos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true \
              -e SPRING_DATASOURCE_USERNAME=root \
              -e SPRING_DATASOURCE_PASSWORD=root \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              juegos-app

            sudo docker image prune -f
            echo " DESPLIEGUE COMPLETADO"