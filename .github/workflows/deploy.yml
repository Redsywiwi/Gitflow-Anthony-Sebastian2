name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/Gitflow-Anthony-Sebastian2

            git fetch origin
            git reset --hard origin/main

            chmod +x mvnw

            ./mvnw clean package -DskipTests

            sudo docker stop juegos-app || true
            sudo docker rm juegos-app || true
            sudo docker rmi juegos-app || true

            sudo docker build -t juegos-app .

            sudo docker run -d \
              --name juegos-app \
              --network host \
              juegos-app

            sudo docker image prune -f