name: Despliegue Automático con Docker en AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Conectarse a AWS y actualizar Docker
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}  # <-- Cambiamos esto para que use tu secreto de ayer
        key: ${{ secrets.SSH_KEY }}
        script: |
          # Vamos a donde vive tu usuario ec2-user
          cd /home/ec2-user
          
          # Si la carpeta del proyecto ya existe, entramos. Si no, clonamos.
          if [ -d "Gitflow-Anthony-Sebastian2-main" ]; then
            cd Gitflow-Anthony-Sebastian2-main
            git pull origin main
          else
            # Esto es por si la carpeta no existe, el robot la crea
            git clone https://github.com/Redsywiwi/Gitflow-Anthony-Sebastian2.git
            cd Gitflow-Anthony-Sebastian2
          fi
          
          # Construimos y ejecutamos con sudo para evitar errores de permisos
          sudo docker build -t mi-proyecto-profe .
          sudo docker stop contenedor-profe || true
          sudo docker rm contenedor-profe || true
          sudo docker run -d -p 80:3000 --name contenedor-profe mi-proyecto-profe