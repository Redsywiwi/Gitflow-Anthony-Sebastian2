name: Despliegue Automático con Docker en AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Conectarse a AWS y actualizar Docker
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}  # <-- Cambiamos esto para que use tu secreto de ayer
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 1. Asegúrate de estar en la carpeta correcta donde está tu código
          # Cambia 'nombre-de-tu-carpeta' por el nombre real de la carpeta en tu AWS
          cd /home/ec2-user/Gitflow-Anthony-Sebastian2-main 
          
          # 2. Descarga los últimos cambios del repositorio
          git pull origin main
          
          # 3. Construye el contenedor (esto debe estar en la misma carpeta que el Dockerfile)
          sudo docker build -t mi-proyecto-profe .
          
          # 4. Detén y elimina el contenedor anterior si existe
          sudo docker stop contenedor-profe || true
          sudo docker rm contenedor-profe || true
          
          # 5. Ejecuta el nuevo contenedor
          sudo docker run -d -p 80:3000 --name contenedor-profe mi-proyecto-profe