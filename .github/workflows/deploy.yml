name: Despliegue Automático con Docker en AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Conectarse a AWS y actualizar Docker
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}  # <-- Cambiamos esto para que use tu secreto de ayer
        key: ${{ secrets.SSH_KEY }}
        script: |
          # 1. Navegar a la carpeta donde tienes tu proyecto en AWS
          # Asegúrate de que esta ruta coincida exactamente con la carpeta en tu EC2
          cd /home/ec2-user/Gitflow-Anthony-Sebastian2-main || exit
          
          # 2. Descargar los cambios más recientes
          git pull origin main
          
          # 3. Construir la imagen de Docker
          # Usamos sudo para evitar el error de 'permission denied' que viste antes
          sudo docker build -t mi-proyecto-profe .
          
          # 4. Detener y eliminar el contenedor anterior si existe
          sudo docker stop contenedor-profe || true
          sudo docker rm contenedor-profe || true
          
          # 5. Ejecutar el nuevo contenedor
          sudo docker run -d -p 80:3000 --name contenedor-profe mi-proyecto-profe