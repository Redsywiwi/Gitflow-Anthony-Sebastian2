          name: docker-image

      - name: Cargar imagen Docker
        run: docker load < image.tar.gz

      - name: Tag imagen para docker-compose
        run: docker tag ${{ env.DOCKER_IMAGE }}:${{ github.sha }} ${{ env.DOCKER_IMAGE }}:latest

