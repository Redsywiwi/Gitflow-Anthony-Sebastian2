name: Despliegue Automático con Docker en AWS

on:
  push:
    branches: [ main ] # Se activa cada vez que haces push a main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Conectarse a AWS y actualizar Docker
      uses: appleboy/ssh-action@master
      with:
        host: ${{ EC2_HOST }}         # La IP de tu AWS (guardada en GitHub)
        username: ${{ EC2_USERNAME }}      # El usuario de tu AWS (suele ser ubuntu)
        key: ${{ SSH_KEY }}       # Tu llave .pem (guardada en GitHub)
        script: |
          # 1. Entrar a la carpeta del proyecto en AWS
          cd /home/ubuntu/Gitflow-Anthony-Sebastian2-main
          
          # 2. Descargar los últimos cambios que subiste a GitHub
          git pull origin main
          
          # 3. Crear el "Tupperware" (Imagen de Docker) con tu nuevo código
          docker build -t mi-proyecto-profe .
          
          # 4. Si ya había una versión vieja corriendo, la apagamos para no chocar
          docker stop contenedor-profe || true
          docker rm contenedor-profe || true
          
          # 5. Encendemos el nuevo contenedor en el puerto de internet (80)
          docker run -d -p 80:3000 --name contenedor-profe mi-proyecto-profe